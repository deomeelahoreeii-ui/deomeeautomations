name: deomee-windmill

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "${LOG_MAX_SIZE:-20m}"
    max-file: "${LOG_MAX_FILE:-5}"
    compress: "true"

services:
  db:
    image: postgres:16
    shm_size: 512m
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: windmill
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  windmill_server:
    image: ${WM_IMAGE}
    pull_policy: missing
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WINDMILL_PORT:-8088}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MODE: server
    volumes:
      - worker_logs:/tmp/windmill/logs
    depends_on:
      db:
        condition: service_healthy
    logging: *default-logging

  windmill_worker:
    image: ${WM_IMAGE}
    pull_policy: missing
    restart: unless-stopped
    privileged: true
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MODE: worker
      WORKER_GROUP: default
      FAVOR_UNSHARE_PID: "true"
    volumes:
      - worker_dependency_cache:/tmp/windmill/cache
      - worker_logs:/tmp/windmill/logs
    depends_on:
      db:
        condition: service_healthy
    logging: *default-logging

  windmill_worker_native:
    image: ${WM_IMAGE}
    pull_policy: missing
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MODE: worker
      WORKER_GROUP: native
      NATIVE_MODE: "true"
      SLEEP_QUEUE: "200"
    volumes:
      - worker_logs:/tmp/windmill/logs
    depends_on:
      db:
        condition: service_healthy
    logging: *default-logging

volumes:
  db_data:
  worker_dependency_cache:
  worker_logs:
