<style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #15202b;
      --muted: #687385;
      --line: #dfe4ea;
      --blue: #1a73e8;
      --green: #188038;
      --red: #c5221f;
      --amber: #b06000;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
    }
    header {
      background: #fff;
      border-bottom: 1px solid var(--line);
      padding: 14px 18px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .bar {
      align-items: center;
      display: flex;
      gap: 12px;
      justify-content: space-between;
      margin: 0 auto;
      max-width: 1180px;
    }
    h1 {
      font-size: 19px;
      line-height: 1.2;
      margin: 0;
    }
    main {
      margin: 0 auto;
      max-width: 1180px;
      padding: 18px;
    }
    button, .tab {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      min-height: 38px;
      padding: 8px 12px;
    }
    button.primary, .tab.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }
    button.success {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }
    button.danger {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }
    button.small {
      min-height: 30px;
      padding: 4px 8px;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: .62;
    }
    .tabs, .actions {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .grid {
      display: grid;
      gap: 14px;
    }
    .two {
      grid-template-columns: minmax(0, 420px) minmax(0, 1fr);
    }
    .full {
      grid-column: 1 / -1;
    }
    .three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .panel, .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    label {
      color: var(--muted);
      display: block;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    input, select, textarea {
      background: #fff;
      border: 1px solid #c9d1dc;
      border-radius: 6px;
      color: var(--text);
      font: inherit;
      min-height: 38px;
      padding: 8px 10px;
      width: 100%;
    }
    textarea {
      min-height: 76px;
      resize: vertical;
    }
    .field {
      margin-bottom: 12px;
    }
    .candidate {
      display: none;
    }
    .candidate.visible {
      display: block;
    }
    .kv {
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr);
    }
    .kv div {
      border-bottom: 1px solid var(--line);
      padding: 8px 4px;
      word-break: break-word;
    }
    .kv div:nth-child(odd) {
      color: var(--muted);
      font-weight: 700;
    }
    .notice {
      border-radius: 6px;
      display: none;
      margin: 12px 0;
      padding: 10px 12px;
    }
    .notice.show { display: block; }
    .notice.ok {
      background: #e6f4ea;
      border: 1px solid #b7dfc1;
      color: #0d652d;
    }
    .notice.warn {
      background: #fef7e0;
      border: 1px solid #f6d58a;
      color: var(--amber);
    }
    .notice.err {
      background: #fce8e6;
      border: 1px solid #f4b9b5;
      color: var(--red);
    }
    .session-strip {
      background: #eef4ff;
      border: 1px solid #c8dafc;
      border-radius: 6px;
      color: #174ea6;
      display: flex;
      gap: 8px;
      justify-content: space-between;
      margin-bottom: 12px;
      padding: 9px 10px;
    }
    .success-banner {
      background: #e6f4ea;
      border: 1px solid #b7dfc1;
      border-radius: 8px;
      color: #0d652d;
      display: none;
      margin-bottom: 14px;
      padding: 12px 14px;
    }
    .success-banner.show {
      display: block;
    }
    .toast {
      background: #123524;
      border-radius: 8px;
      bottom: 18px;
      box-shadow: 0 10px 28px rgba(0,0,0,.18);
      color: #fff;
      display: none;
      left: 50%;
      max-width: calc(100% - 32px);
      padding: 12px 14px;
      position: fixed;
      transform: translateX(-50%);
      z-index: 30;
    }
    .toast.show {
      display: block;
    }
    .metric strong {
      display: block;
      font-size: 28px;
      line-height: 1.1;
      margin-top: 4px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 9px 8px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #f1f3f4;
      font-size: 12px;
      text-transform: uppercase;
    }
    .table-wrap {
      overflow-x: auto;
    }
    .compact-table th, .compact-table td {
      font-size: 13px;
      padding: 7px 6px;
    }
    .status-choice {
      align-items: center;
      display: inline-flex;
      gap: 6px;
      margin-right: 10px;
      white-space: nowrap;
    }
    .bulk-reason {
      min-width: 220px;
    }
    .bulk-reason select,
    .bulk-reason input {
      min-height: 34px;
      padding: 6px 8px;
    }
    .bulk-other-reason {
      margin-top: 6px;
    }
    .bulk-summary {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .pill {
      background: #eef4ff;
      border: 1px solid #c8dafc;
      border-radius: 999px;
      color: #174ea6;
      display: inline-block;
      font-size: 13px;
      padding: 5px 9px;
    }
    .pill.present {
      background: #e6f4ea;
      border-color: #b7dfc1;
      color: #0d652d;
    }
    .pill.absent {
      background: #fce8e6;
      border-color: #f4b9b5;
      color: var(--red);
    }
    .user-badge {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }
    .user-badge strong {
      color: var(--text);
      font-weight: 700;
    }
    .admin-tool-row {
      align-items: center;
      border-top: 1px solid var(--line);
      display: grid;
      gap: 12px;
      grid-template-columns: minmax(0, 1fr) auto;
      padding: 12px 0;
    }
    .admin-tool-row:first-of-type {
      border-top: 0;
      padding-top: 0;
    }
    .admin-result {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 6px;
      margin-top: 12px;
      padding: 12px;
    }
    .admin-result.ok {
      background: #e6f4ea;
      border-color: #b7dfc1;
      color: #0d652d;
    }
    .admin-result.warn {
      background: #fef7e0;
      border-color: #f6d58a;
      color: var(--amber);
    }
    .admin-result.err {
      background: #fce8e6;
      border-color: #f4b9b5;
      color: var(--red);
    }
    .admin-json {
      background: #0f1720;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 12px;
      line-height: 1.45;
      margin: 10px 0 0;
      max-height: 320px;
      overflow: auto;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .reason-list {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }
    .reason-group {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      width: 100%;
    }
    .reason-item {
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      display: inline-flex;
      gap: 6px;
      padding: 5px;
    }
    .reason-item.archived {
      background: #f8fafc;
      opacity: .9;
    }
    .muted {
      color: var(--muted);
    }
    .hidden {
      display: none !important;
    }
    @media (max-width: 820px) {
      header { padding: 12px; }
      main { padding: 12px; }
      .bar {
        align-items: flex-start;
        flex-direction: column;
      }
      .two, .three {
        grid-template-columns: 1fr;
      }
      .kv {
        grid-template-columns: 120px minmax(0, 1fr);
      }
      .admin-tool-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
