services:
  nats:
    image: nats:2.12.11-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:${NATS_PORT:-4222}:4222"
      - "127.0.0.1:${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- 'http://127.0.0.1:8222/healthz?js-enabled-only=true' >/dev/null"]
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 2s

  ntfy:
    image: binwiederhier/ntfy:v2.26.0
    command: serve
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Karachi}
      NTFY_BASE_URL: ${NTFY_PUBLIC_BASE_URL:-http://localhost:2586}
      NTFY_LISTEN_HTTP: :80
      NTFY_CACHE_FILE: /var/lib/ntfy/cache.db
      NTFY_CACHE_DURATION: ${NTFY_CACHE_DURATION:-72h}
      NTFY_KEEPALIVE_INTERVAL: ${NTFY_KEEPALIVE_INTERVAL:-45s}
      NTFY_AUTH_FILE: /var/lib/ntfy/user.db
      NTFY_AUTH_DEFAULT_ACCESS: deny-all
      NTFY_ENABLE_LOGIN: "true"
    ports:
      # Localhost is the secure default. Set NTFY_BIND_ADDRESS to the laptop's
      # LAN IP only when LAN clients should connect directly.
      - "${NTFY_BIND_ADDRESS:-127.0.0.1}:${NTFY_PORT:-2586}:80"
    volumes:
      - ntfy-data:/var/lib/ntfy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://127.0.0.1:80/v1/health -O - | grep -q '\"healthy\":true'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_DB: automation_platform
      POSTGRES_USER: automation
      POSTGRES_PASSWORD: automation
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U automation -d automation_platform"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    image: automation-platform-python:latest
    build:
      context: .
      dockerfile: infra/docker/python.Dockerfile
    command: uv run uvicorn automation_api.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+psycopg://automation:automation@postgres:5432/automation_platform
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DEOMEE_ROOT: /workspace/deomeeautomations
      CRM_PROJECT_ROOT: /workspace/deomeeautomations/crm-management-system
      ARTIFACT_ROOT: /app/data/artifacts
      LEGACY_UV_BIN: uv
      API_CORS_ORIGINS: http://localhost:4321
      NTFY_ENABLED: ${NTFY_ENABLED:-false}
      NTFY_PUBLISH_URL: http://ntfy:80
      NTFY_PUBLIC_BASE_URL: ${NTFY_PUBLIC_BASE_URL:-http://localhost:2586}
      NTFY_EXPOSURE_MODE: ${NTFY_EXPOSURE_MODE:-local}
      NTFY_TOKEN: ${NTFY_TOKEN:-}
      NTFY_TIMEOUT_SECONDS: ${NTFY_TIMEOUT_SECONDS:-5}
      ANTIDENGUE_NTFY_ENABLED: ${ANTIDENGUE_NTFY_ENABLED:-false}
      ANTIDENGUE_NTFY_TOPIC: ${ANTIDENGUE_NTFY_TOPIC:-automation-antidengue}
    ports:
      - "8020:8000"
    volumes:
      - ..:/workspace/deomeeautomations
      - api-data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      ntfy:
        condition: service_healthy

  worker:
    image: automation-platform-python:latest
    build:
      context: .
      dockerfile: infra/docker/python.Dockerfile
    command: uv run celery -A automation_worker.main.celery_app worker --queues=antidengue,antidengue-preview-v2,crm,whatsapp --loglevel=INFO
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from sqlmodel import Session; from automation_core.database import engine; from automation_core.worker_runtime import require_compatible_workers; from whatsapp_gateway.previews.compiler.capabilities import local_compiler_runtime; s=Session(engine); require_compatible_workers(s, local_compiler_runtime()); s.close()\""
        ]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 15s
    environment:
      DATABASE_URL: postgresql+psycopg://automation:automation@postgres:5432/automation_platform
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DEOMEE_ROOT: /workspace/deomeeautomations
      CRM_PROJECT_ROOT: /workspace/deomeeautomations/crm-management-system
      ARTIFACT_ROOT: /app/data/artifacts
      LEGACY_UV_BIN: uv
    volumes:
      - ..:/workspace/deomeeautomations
      - api-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    image: automation-platform-python:latest
    build:
      context: .
      dockerfile: infra/docker/python.Dockerfile
    command: uv run python -m antidengue_automation.scheduler_service
    environment:
      DATABASE_URL: postgresql+psycopg://automation:automation@postgres:5432/automation_platform
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DEOMEE_ROOT: /workspace/deomeeautomations
      CRM_PROJECT_ROOT: /workspace/deomeeautomations/crm-management-system
      ARTIFACT_ROOT: /app/data/artifacts
      LEGACY_UV_BIN: uv
      ANTIDENGUE_SCHEDULER_ENABLED: ${ANTIDENGUE_SCHEDULER_ENABLED:-true}
      ANTIDENGUE_SCHEDULER_INTERVAL_SECONDS: ${ANTIDENGUE_SCHEDULER_INTERVAL_SECONDS:-10}
      NTFY_ENABLED: ${NTFY_ENABLED:-false}
      # Containers publish over the private Compose network. Subscribers use
      # NTFY_PUBLIC_BASE_URL, which can later be LAN, Tailscale, or Cloudflare.
      NTFY_PUBLISH_URL: http://ntfy:80
      NTFY_PUBLIC_BASE_URL: ${NTFY_PUBLIC_BASE_URL:-http://localhost:2586}
      NTFY_EXPOSURE_MODE: ${NTFY_EXPOSURE_MODE:-local}
      NTFY_TOKEN: ${NTFY_TOKEN:-}
      NTFY_TIMEOUT_SECONDS: ${NTFY_TIMEOUT_SECONDS:-5}
      ANTIDENGUE_NTFY_ENABLED: ${ANTIDENGUE_NTFY_ENABLED:-false}
      ANTIDENGUE_NTFY_TOPIC: ${ANTIDENGUE_NTFY_TOPIC:-automation-antidengue}
    volumes:
      - ..:/workspace/deomeeautomations
      - api-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      ntfy:
        condition: service_healthy

  flower:
    image: automation-platform-python:latest
    build:
      context: .
      dockerfile: infra/docker/python.Dockerfile
    command: uv run celery -A automation_worker.main.celery_app flower --port=5555
    environment:
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      PUBLIC_API_BASE_URL: http://localhost:8020
    ports:
      - "4321:4321"
    depends_on:
      api:
        condition: service_healthy

volumes:
  nats-data:
  ntfy-data:
  postgres-data:
  rabbitmq-data:
  redis-data:
  api-data:
