version: 2
updates:
  - package-ecosystem: pip
    directory: /automation-platform
    schedule:
      interval: weekly
    groups:
      python-dependencies:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /automation-platform/apps/web
    schedule:
      interval: weekly
    groups:
      web-dependencies:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /automation-platform
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /automation-platform/apps/web
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /automation-platform/infra/docker
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
